<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Fond bleu marine arrondi -->
  <rect width="32" height="32" rx="5" fill="#182354"/>
  <!-- Jante -->
  <circle cx="16" cy="16" r="12.5" fill="none" stroke="#f2e6d8" stroke-width="2"/>
  <!-- Rayons diagonaux -->
  <line x1="7.6" y1="7.6" x2="14.2" y2="14.2" stroke="#f2e6d8" stroke-width="1.1" stroke-linecap="round"/>
  <line x1="17.8" y1="17.8" x2="24.4" y2="24.4" stroke="#f2e6d8" stroke-width="1.1" stroke-linecap="round"/>
  <line x1="24.4" y1="7.6" x2="17.8" y2="14.2" stroke="#f2e6d8" stroke-width="1.1" stroke-linecap="round"/>
  <line x1="14.2" y1="17.8" x2="7.6" y2="24.4" stroke="#f2e6d8" stroke-width="1.1" stroke-linecap="round"/>
  <!-- Rayons cardinaux -->
  <line x1="16" y1="3.5" x2="16" y2="13.5" stroke="#f2e6d8" stroke-width="1.1" stroke-linecap="round"/>
  <line x1="16" y1="18.5" x2="16" y2="28.5" stroke="#f2e6d8" stroke-width="1.1" stroke-linecap="round"/>
  <line x1="3.5" y1="16" x2="13.5" y2="16" stroke="#f2e6d8" stroke-width="1.1" stroke-linecap="round"/>
  <line x1="18.5" y1="16" x2="28.5" y2="16" stroke="#f2e6d8" stroke-width="1.1" stroke-linecap="round"/>
  <!-- Moyeu terracotta -->
  <circle cx="16" cy="16" r="2.8" fill="#ff4701"/>
</svg>
